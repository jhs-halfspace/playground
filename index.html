<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- This meta tag is critical for mobile. Without it, your phone browser
       will render the page at desktop width and zoom out, making everything tiny.
       "viewport-fit=cover" lets the app extend into the notch area on iPhones. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Word Games</title>

  <!-- Link to our PWA manifest. The browser reads this to know it's installable. -->
  <link rel="manifest" href="./manifest.json">

  <!-- iOS doesn't fully support the manifest yet, so we need these meta tags
       to get a proper "Add to Home Screen" experience on iPhones. -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Word Games">
  <link rel="apple-touch-icon" href="./icon-192.png">

  <!-- Theme color sets the browser toolbar / status bar color -->
  <meta name="theme-color" content="#538d4e">

  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <!-- LOGIN GATE: covers everything until correct credentials are entered.
       This is a client-side gate only - not real security (see app.js comments). -->
  <div id="login-screen" class="screen active">
    <div class="login-box">
      <h2>Word Games</h2>
      <p class="login-subtitle">Enter credentials to continue</p>
      <form id="login-form" autocomplete="off">
        <input type="text" id="login-user" placeholder="Username" autocomplete="username" required>
        <input type="password" id="login-pass" placeholder="Code" autocomplete="current-password" required>
        <button type="submit" class="login-btn">Enter</button>
      </form>
      <p id="login-error" class="login-error hidden">Incorrect credentials</p>
    </div>
  </div>

  <!-- HEADER: Always visible, shows app title and back button when in a game -->
  <header id="header" class="hidden">
    <button id="back-btn" class="header-btn hidden" aria-label="Back to menu">&larr;</button>
    <h1 id="header-title">Word Games</h1>
  </header>

  <!-- HOME SCREEN: Game selection menu -->
  <main id="home-screen" class="screen active">
    <div class="game-card" data-game="wordle">
      <h2>Wordle</h2>
      <p>Guess the 5-letter word in 6 tries</p>
    </div>
    <div class="game-card" data-game="connections">
      <h2>Connections</h2>
      <p>Find 4 groups of 4 related words</p>
    </div>
  </main>

  <!-- WORDLE SCREEN -->
  <main id="wordle-screen" class="screen">
    <div id="wordle-board"></div>
    <div id="wordle-message"></div>
    <div id="wordle-keyboard"></div>
    <button id="wordle-new-game" class="new-game-btn hidden">New Game</button>
  </main>

  <!-- CONNECTIONS SCREEN -->
  <main id="connections-screen" class="screen">
    <div id="connections-solved"></div>
    <div id="connections-board"></div>
    <div id="connections-mistakes"></div>
    <div id="connections-controls">
      <button id="connections-deselect" class="ctrl-btn">Deselect All</button>
      <button id="connections-submit" class="ctrl-btn primary">Submit</button>
    </div>
    <button id="connections-new-game" class="new-game-btn hidden">New Game</button>
  </main>

  <!-- Load scripts in order: data first, then game logic, then the app shell -->
  <script src="./words.js"></script>
  <script src="./wordle.js"></script>
  <script src="./connections.js"></script>
  <script src="./app.js"></script>
</body>
</html>
